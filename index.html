<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Arbitrage Calculator</title>
<style>
  :root {
    --paper: #ece7dc;
    --slip: #faf8f2;
    --ink: #1b1815;
    --muted: #8a8172;
    --line: #d8d0c0;
    --rule: #cbc2ae;
    --green: #1f7a4d;
    --red: #b23b2e;
    --amber: #b8863b;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    background: var(--paper);
    color: var(--ink);
    overflow-x: auto;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  .stage {
    display: flex;
    align-items: flex-start;
    gap: 20px;
    padding: 28px;
    width: max-content;
    margin: 0 auto;
  }
  .slip {
    flex: 0 0 400px;
    width: 400px;
    background: var(--slip);
    border: 1.5px solid var(--ink);
    box-shadow: 6px 6px 0 rgba(27,24,21,.12);
  }

  @media (max-width: 480px) {
    body { scroll-snap-type: x mandatory; }
    .slip { flex-basis: calc(100vw - 28px); width: calc(100vw - 28px); scroll-snap-align: center; }
    .stage { padding: 14px; gap: 14px; }
  }

  /* add-ticket square */
  .add-ticket {
    flex: 0 0 46px; width: 46px; height: 46px; cursor: pointer;
    background: var(--slip); border: 1.5px solid var(--ink);
    box-shadow: 4px 4px 0 rgba(27,24,21,.12);
    font-family: var(--mono); font-size: 26px; font-weight: 400; line-height: 1; color: var(--ink);
    display: flex; align-items: center; justify-content: center;
  }
  .add-ticket:hover { background: var(--ink); color: var(--slip); }
  .add-ticket:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0 rgba(27,24,21,.12); }

  /* header */
  .head { padding: 18px 22px 14px; border-bottom: 1.5px dashed var(--rule); }
  .head-top { display: flex; align-items: baseline; justify-content: space-between; gap: 10px; }
  .ticket-no { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .08em; }
  .kill { border: 0; background: transparent; cursor: pointer; padding: 0; color: var(--muted);
    font-family: var(--mono); font-size: 15px; line-height: 1; }
  .kill:hover { color: var(--red); }
  .title-edit { display: flex; align-items: center; gap: 8px; margin-top: 4px; }
  input.ticket-name {
    flex: 0 1 auto; min-width: 0; max-width: 100%;
    font-size: 19px; font-weight: 800; letter-spacing: -.01em; text-transform: uppercase;
    font-family: inherit; color: var(--ink);
    background: transparent; border: 0; border-bottom: 1px dashed var(--rule); border-radius: 0; padding: 0 0 1px;
  }
  input.ticket-name::placeholder { color: var(--muted); opacity: 1; }
  .title-edit:hover input.ticket-name { border-bottom-color: var(--ink); }
  input.ticket-name:focus { border-bottom-style: solid; border-bottom-color: var(--ink); background: transparent; outline: none; }
  .edit-title {
    flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center;
    border: 0; background: transparent; cursor: pointer; padding: 0; color: var(--muted);
  }
  .edit-title svg { width: 13px; height: 13px; display: block; }
  .title-edit:hover .edit-title, .edit-title:hover { color: var(--ink); }
  .tag { font-size: 11px; color: var(--muted); letter-spacing: .02em; }
  .head-row { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-top: 4px; }

  .fmt { display: flex; margin: 14px 22px 0; border: 1px solid var(--ink); }
  .fmt button {
    flex: 1; border: 0; background: transparent; color: var(--muted); cursor: pointer;
    font-family: var(--mono); font-size: 11px; font-weight: 600; letter-spacing: .1em;
    padding: 7px 0; text-transform: uppercase;
  }
  .fmt button + button { border-left: 1px solid var(--ink); }
  .fmt button.active { background: var(--ink); color: var(--slip); }

  .body { padding: 16px 22px 4px; }
  .book { margin-bottom: 14px; }
  .book h2 {
    font-family: var(--mono); font-size: 11px; margin: 0 0 8px; color: var(--ink);
    letter-spacing: .1em; text-transform: uppercase; display: flex; align-items: center; gap: 8px;
  }
  .book h2 .rule { flex: 1; height: 1px; background: var(--rule); }
  .name-edit { display: inline-flex; align-items: center; gap: 5px; flex: 0 0 auto; }
  input.book-name {
    flex: 0 0 auto; width: 100px; padding: 1px 0; font-size: 11px; font-family: var(--mono);
    font-weight: 400; letter-spacing: .1em; text-transform: uppercase; color: var(--ink);
    background: transparent; border: 0; border-bottom: 1px dashed var(--rule); border-radius: 0;
    cursor: text;
  }
  input.book-name::placeholder { color: var(--muted); opacity: 1; }
  .name-edit:hover input.book-name { border-bottom-color: var(--ink); }
  input.book-name:focus { border-bottom-style: solid; border-bottom-color: var(--ink); background: transparent; }
  .edit-name {
    flex: 0 0 auto; display: inline-flex; align-items: center; justify-content: center;
    border: 0; background: transparent; cursor: pointer; padding: 0; color: var(--muted);
  }
  .edit-name svg { width: 12px; height: 12px; display: block; }
  .name-edit:hover .edit-name, .edit-name:hover { color: var(--ink); }

  .clr {
    border: 0; background: transparent; cursor: pointer; padding: 0;
    font-family: var(--mono); font-size: 10px; letter-spacing: .08em; text-transform: uppercase;
    color: var(--muted); text-decoration: underline; text-underline-offset: 2px;
  }
  .clr:hover { color: var(--red); }
  .rmv { margin-left: 4px; }
  .rmv:hover { color: var(--red); }

  .add-book {
    width: 100%; margin: 2px 0 4px; padding: 9px 0; cursor: pointer;
    background: transparent; border: 1px dashed var(--ink); color: var(--ink);
    font-family: var(--mono); font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  }
  .add-book:hover { background: var(--ink); color: var(--slip); border-style: solid; }

  .row { display: flex; gap: 10px; }
  .field { flex: 1; }
  .field.full { flex: none; width: 100%; }
  label { display: block; font-size: 10px; color: var(--muted); margin-bottom: 4px; letter-spacing: .06em; text-transform: uppercase; }
  input {
    width: 100%; padding: 9px 11px; font-size: 16px; font-family: var(--mono);
    background: #fff; border: 1px solid var(--line); border-radius: 0;
    color: var(--ink); outline: none;
  }
  input::placeholder { color: #c3baa8; }
  input:focus { border-color: var(--ink); background: #fffdf7; }

  /* best price for each side (only shown when 2+ books compete) */
  .odds.best { border-color: var(--green); box-shadow: inset 0 0 0 1px var(--green); background: #f2f8f4; }
  .odds.best:focus { border-color: var(--green); }

  /* American-odds sign toggle in front of each odds input */
  .odds-input { display: flex; }
  .odds-input input { flex: 1; }
  .sign {
    flex: 0 0 32px; border: 1px solid var(--line); border-right: 0; background: #fff;
    cursor: pointer; font-family: var(--mono); font-size: 17px; font-weight: 800; line-height: 1;
    color: var(--ink); padding: 0;
  }
  .sign[data-sign="+"] { color: var(--green); }
  .sign[data-sign="-"] { color: var(--red); }
  .sign:hover { background: var(--paper); }
  .slip.decimal-mode .sign { display: none; }

  /* per-book stake input (always visible; suggestion is greyed, never auto-filled) */
  .book-stake { display: block; margin-top: 10px; }
  .book-stake .stake-input { display: flex; }
  .book-stake.off .stake-input { display: none; }
  .book-stake.off .stake-label { color: var(--muted); }
  .stake-cur {
    flex: 0 0 auto; display: flex; align-items: center; padding: 0 11px;
    border: 1px solid var(--line); border-right: 0; background: #f2f8f4;
    color: var(--green); font-family: var(--mono); font-size: 15px; font-weight: 700;
  }
  .book-stake-input { flex: 1; }
  .stake-suggest { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .03em; padding: 4px 0 0; }
  .stake-suggest:empty { display: none; }
  .stake-note { display: none; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .03em; padding: 3px 0; }
  .book-stake.off .stake-note { display: block; }

  /* lock toggle on the stake input */
  .stake-lock {
    flex: 0 0 auto; display: flex; align-items: center; justify-content: center; width: 34px;
    border: 1px solid var(--line); border-left: 0; background: #fff; cursor: pointer; color: var(--muted); padding: 0;
  }
  .stake-lock svg { width: 13px; height: 13px; display: block; }
  .stake-lock:hover { color: var(--ink); }
  .stake-lock.locked { color: var(--ink); background: #eee7d6; }
  .book-stake-input[readonly] { background: #f4f1ea; color: var(--ink); cursor: default; }

  /* per-book profit boost */
  .boost-row { display: flex; align-items: center; flex-wrap: wrap; gap: 6px 8px; margin-top: 12px; }
  .boost-label { font-size: 10px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; }
  .boost-wrap { display: inline-flex; align-items: stretch; }
  .boost {
    width: 50px; padding: 5px 8px; font-size: 13px; font-family: var(--mono); text-align: right;
    background: #fff; border: 1px solid var(--line); border-radius: 0; color: var(--ink); outline: none;
  }
  .boost:focus { border-color: var(--ink); }
  .boost-pct { display: flex; align-items: center; padding: 0 8px; font-family: var(--mono); font-size: 13px; color: var(--muted); border: 1px solid var(--line); border-left: 0; background: #fff; }
  .boost-hint { font-size: 10px; color: var(--muted); font-family: var(--mono); letter-spacing: .02em; }
  .boosted-odds { font-family: var(--mono); font-size: 10px; color: var(--green); letter-spacing: .03em; padding: 4px 0 0; }
  .boosted-odds:empty { display: none; }

  /* result */
  .result { border-top: 1.5px solid var(--ink); background: var(--paper); padding: 18px 22px 20px; }
  .verdict-row { display: flex; align-items: baseline; justify-content: space-between; }
  .verdict-label { font-family: var(--mono); font-size: 11px; letter-spacing: .12em; color: var(--muted); text-transform: uppercase; }
  .verdict { font-size: 30px; font-weight: 900; letter-spacing: .04em; line-height: 1; }
  .verdict.yes { color: var(--green); }
  .verdict.no { color: var(--red); }
  .verdict.idle { color: var(--muted); font-size: 15px; font-weight: 700; letter-spacing: 0; }

  .meter { margin-top: 14px; }
  .meter-bar { height: 8px; background: #fff; border: 1px solid var(--ink); position: relative; }
  .meter-fill { position: absolute; left: 0; top: 0; bottom: 0; width: 0; transition: width .18s ease; }
  .meter-mark { position: absolute; top: -3px; bottom: -3px; left: 50%; width: 2px; margin-left: -1px; background: var(--ink); }
  .meter-scale { display: flex; justify-content: space-between; font-family: var(--mono); font-size: 10px; color: var(--muted); margin-top: 5px; }
  .meter-scale .mid { color: var(--ink); font-weight: 700; }
  .meter-read { font-family: var(--mono); font-size: 12px; margin-top: 8px; color: var(--ink); }
  .meter-read b { font-weight: 700; }

  .breakdown { margin-top: 16px; padding-top: 14px; border-top: 1px dashed var(--rule); display: none; }
  .breakdown.show { display: block; }
  .line { display: flex; justify-content: space-between; align-items: baseline; font-size: 13px; padding: 5px 0; }
  .line .lbl { color: var(--ink); }
  .line .sub { display: block; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .03em; }
  .line .amt { font-family: var(--mono); font-size: 14px; font-weight: 600; }
  .profit { display: flex; justify-content: space-between; align-items: baseline; margin-top: 8px; padding-top: 10px; border-top: 1.5px solid var(--ink); }
  .profit .lbl { font-size: 12px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; }
  .profit .amt { font-family: var(--mono); font-size: 20px; font-weight: 800; }
</style>
</head>
<body>
  <div class="stage" id="stage">
    <button class="add-ticket" id="addTicket" title="Add a comparison ticket">+</button>
  </div>

<script>
  const MIN_BOOKS = 2;
  let seq = 0;        // globally-unique source for odds input ids
  let ticketNo = 0;   // running ticket number shown on each slip

  const money = n => (n < 0 ? "-$" : "$") + Math.abs(n).toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  // Build one fully self-contained arbitrage ticket and return its root element.
  function createTicket() {
    ticketNo++;
    const num = String(ticketNo).padStart(4, "0");

    const root = document.createElement("div");
    root.className = "slip decimal-mode";
    root.innerHTML = `
      <div class="head">
        <div class="head-top">
          <span class="ticket-no">NO. ${num} · ARB</span>
          <button class="kill" title="Remove this ticket">✕</button>
        </div>
        <div class="title-edit">
          <input class="ticket-name" type="text" spellcheck="false" value="Arbitrage Ticket" placeholder="Arbitrage Ticket" aria-label="Ticket name" />
          <button class="edit-title" title="Edit ticket name" aria-label="Edit ticket name">
            <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.3 2.7l2 2L6 12l-2.6.6L4 10z"/><path d="M10.2 3.8l2 2"/></svg>
          </button>
        </div>
        <div class="head-row">
          <span class="tag">Best price each side across all books</span>
          <button class="clr btn-clear-all">Clear all</button>
        </div>
      </div>

      <div class="fmt">
        <button data-fmt="decimal" class="active">Decimal</button>
        <button data-fmt="american">American</button>
      </div>

      <div class="body">
        <div class="books"></div>
        <button class="add-book">+ Add book</button>
      </div>

      <div class="result">
        <div class="verdict-row">
          <span class="verdict-label">Arbitrage?</span>
          <span class="verdict idle">— — —</span>
        </div>
        <div class="meter" style="display:none">
          <div class="meter-bar"><div class="meter-fill"></div><div class="meter-mark"></div></div>
          <div class="meter-scale"><span>90%</span><span class="mid">100% break-even</span><span>110%</span></div>
          <div class="meter-read"></div>
        </div>
        <div class="breakdown"></div>
      </div>`;

    // --- scoped helpers -----------------------------------------------------
    const q = sel => root.querySelector(sel);
    const qa = sel => root.querySelectorAll(sel);
    let fmt = "decimal";
    const placeholders = () => fmt === "decimal" ? ["2.10", "1.95"] : ["110", "105"];
    const signOf = id => root.querySelector('.sign[data-for="' + id + '"]').dataset.sign;

    // Basis for the greyed balanced-stake suggestion when no stake is entered yet.
    const DEFAULT_TOTAL = 100;

    // Decimal odds -> a display string in the ticket's current format.
    const toDisplay = dec => {
      if (fmt === "decimal") return dec.toFixed(2);
      return dec >= 2 - 1e-9 ? "+" + Math.round((dec - 1) * 100) : "-" + Math.round(100 / (dec - 1));
    };

    function toDecimal(id) {
      const inp = root.querySelector("#" + id);
      const raw = inp.value;
      if (raw === "" || raw == null) return null;
      const v = parseFloat(raw);
      if (isNaN(v)) return null;
      if (fmt === "american") {
        const mag = Math.abs(v);
        if (mag < 1) return null;
        return signOf(id) === "-" ? 1 + 100 / mag : 1 + mag / 100;
      }
      return v > 1 ? v : null;
    }

    // --- books --------------------------------------------------------------
    const booksEl = q(".books");

    function addBook() {
      seq++;
      const aId = "a" + seq, bId = "b" + seq;
      const [phA, phB] = placeholders();
      const el = document.createElement("div");
      el.className = "book";
      el.innerHTML = `
        <h2><span class="name-edit">
            <input class="book-name" type="text" spellcheck="false" />
            <button class="edit-name" title="Edit book name" aria-label="Edit book name">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M11.3 2.7l2 2L6 12l-2.6.6L4 10z"/><path d="M10.2 3.8l2 2"/></svg>
            </button>
          </span><span class="rule"></span>
          <button class="clr btn-clear">Clear</button>
          <button class="clr rmv btn-remove">Remove</button>
        </h2>
        <div class="row">
          <div class="field">
            <label>Team A</label>
            <div class="odds-input">
              <button class="sign" data-for="${aId}" data-sign="+">+</button>
              <input type="text" inputmode="decimal" class="odds odds-a" id="${aId}" placeholder="${phA}" />
            </div>
            <div class="boosted-odds" data-side="a"></div>
          </div>
          <div class="field">
            <label>Team B</label>
            <div class="odds-input">
              <button class="sign" data-for="${bId}" data-sign="-">-</button>
              <input type="text" inputmode="decimal" class="odds odds-b" id="${bId}" placeholder="${phB}" />
            </div>
            <div class="boosted-odds" data-side="b"></div>
          </div>
        </div>
        <div class="boost-row">
          <span class="boost-label">Boost</span>
          <span class="boost-wrap">
            <input type="text" inputmode="decimal" class="boost" placeholder="0" />
            <span class="boost-pct">%</span>
          </span>
          <span class="boost-hint">profit boost on this book's bet</span>
        </div>
        <div class="book-stake">
          <label class="stake-label">Your stake</label>
          <div class="stake-input">
            <span class="stake-cur">$</span>
            <input type="text" inputmode="decimal" class="book-stake-input" />
            <button class="stake-lock" title="Lock this stake" aria-label="Lock this stake">
              <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3.5" y="7" width="9" height="6.3" rx="1"/><path d="M5.5 7V5a2.5 2.5 0 0 1 5 0v2"/></svg>
            </button>
          </div>
          <div class="stake-suggest"></div>
          <div class="stake-note"></div>
        </div>`;
      booksEl.appendChild(el);

      el.querySelectorAll(".odds").forEach(inp => inp.addEventListener("input", calc));
      el.querySelector(".book-name").addEventListener("input", calc);
      el.querySelector(".edit-name").addEventListener("click", () => {
        const inp = el.querySelector(".book-name");
        inp.focus();
        inp.select();
      });
      el.querySelectorAll(".sign").forEach(btn => btn.addEventListener("click", () => {
        const next = btn.dataset.sign === "+" ? "-" : "+";
        btn.dataset.sign = next;
        btn.textContent = next;
        calc();
      }));
      const stakeInp = el.querySelector(".book-stake-input");
      const lockBtn = el.querySelector(".stake-lock");
      const unlock = () => { stakeInp.dataset.locked = ""; stakeInp.readOnly = false; lockBtn.classList.remove("locked"); };

      el.querySelector(".btn-clear").addEventListener("click", () => {
        el.querySelectorAll(".odds").forEach(inp => { inp.value = ""; });
        el.querySelector(".boost").value = "";
        stakeInp.value = ""; unlock();
        calc();
        el.querySelector(".odds-a").focus();
      });
      el.querySelector(".btn-remove").addEventListener("click", () => {
        el.remove();
        renumber();
        calc();
      });

      el.querySelector(".boost").addEventListener("input", calc);
      stakeInp.addEventListener("input", calc);
      lockBtn.addEventListener("click", () => {
        if (stakeInp.dataset.locked === "1") { unlock(); }
        else {
          // Lock in the current stake — adopt the suggestion if the box is empty.
          if (!stakeInp.value && stakeInp.placeholder) stakeInp.value = stakeInp.placeholder;
          if (!stakeInp.value) return; // nothing to lock yet
          stakeInp.dataset.locked = "1"; stakeInp.readOnly = true; lockBtn.classList.add("locked");
        }
        calc();
      });

      renumber();
      return el;
    }

    function renumber() {
      const books = [...booksEl.querySelectorAll(".book")];
      books.forEach((bk, i) => {
        bk.querySelector(".book-name").placeholder = "Book " + (i + 1);
        bk.querySelector(".btn-remove").style.display = books.length > MIN_BOOKS ? "" : "none";
      });
    }

    // --- wiring -------------------------------------------------------------
    q(".add-book").addEventListener("click", () => addBook().querySelector(".odds-a").focus());

    qa(".fmt button").forEach(btn => btn.addEventListener("click", () => {
      fmt = btn.dataset.fmt;
      qa(".fmt button").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      root.classList.toggle("decimal-mode", fmt === "decimal");
      const [phA, phB] = placeholders();
      qa(".odds-a").forEach(inp => inp.placeholder = phA);
      qa(".odds-b").forEach(inp => inp.placeholder = phB);
      calc();
    }));

    q(".btn-clear-all").addEventListener("click", () => {
      qa(".odds").forEach(inp => { inp.value = ""; });
      qa(".boost").forEach(inp => { inp.value = ""; });
      qa(".book-stake-input").forEach(inp => { inp.value = ""; inp.dataset.locked = ""; inp.readOnly = false; });
      qa(".stake-lock").forEach(b => b.classList.remove("locked"));
      calc();
    });
    q(".kill").addEventListener("click", () => root.remove());

    // Editable ticket title — auto-size to its content; pencil focuses + selects it.
    const titleInp = q(".ticket-name");
    const sizeTitle = () => { titleInp.size = Math.max((titleInp.value || titleInp.placeholder).length + 1, 2); };
    titleInp.addEventListener("input", sizeTitle);
    q(".edit-title").addEventListener("click", () => { titleInp.focus(); titleInp.select(); });
    sizeTitle();

    // --- calculation --------------------------------------------------------
    function calc() {
      const verdict = q(".verdict");
      const pct = q(".meter-read");
      const meter = q(".meter");
      const meterFill = q(".meter-fill");
      const breakdown = q(".breakdown");

      // Gather each book's raw + boosted prices. A profit boost lifts the winnings
      // on the one bet you place at that book: odds' = 1 + (odds-1)*(1+b).
      const data = [...booksEl.querySelectorAll(".book")].map(bk => {
        const nameInp = bk.querySelector(".book-name");
        const boost = Math.max(0, parseFloat(bk.querySelector(".boost").value) || 0);
        const bf = 1 + boost / 100;
        const inpA = bk.querySelector(".odds-a"), inpB = bk.querySelector(".odds-b");
        const rawA = toDecimal(inpA.id), rawB = toDecimal(inpB.id);
        return { bk, inpA, inpB, boost, rawA, rawB,
          name: nameInp.value.trim() || nameInp.placeholder,
          bA: rawA == null ? null : 1 + (rawA - 1) * bf,
          bB: rawB == null ? null : 1 + (rawB - 1) * bf };
      });

      // Show each boosted price (in the current odds format) under its input.
      data.forEach(d => {
        const capA = d.bk.querySelector('.boosted-odds[data-side="a"]');
        const capB = d.bk.querySelector('.boosted-odds[data-side="b"]');
        capA.textContent = d.boost > 0 && d.bA != null ? "→ " + toDisplay(d.bA) : "";
        capB.textContent = d.boost > 0 && d.bB != null ? "→ " + toDisplay(d.bB) : "";
      });

      // Best price for a side. `rawBook`, if given, is spending its boost on the
      // OTHER side, so here it only offers its raw (unboosted) price.
      const bestSide = (side, rawBook) => {
        let best = 0, w = null;
        data.forEach(d => {
          const v = d === rawBook ? (side === "A" ? d.rawA : d.rawB) : (side === "A" ? d.bA : d.bB);
          if (v != null && v > best) { best = v; w = d; }
        });
        return { best, w, inp: w ? (side === "A" ? w.inpA : w.inpB) : null,
                 boost: (w && w !== rawBook) ? w.boost : 0 };
      };

      let A = bestSide("A", null), B = bestSide("B", null);
      // If one boosted book is best on both sides, it can only spend its boost once.
      if (A.w && A.w === B.w && A.w.boost > 0) {
        const totBoostA = 1 / A.best + 1 / bestSide("B", A.w).best; // boost stays on A
        const totBoostB = 1 / bestSide("A", B.w).best + 1 / B.best; // boost stays on B
        if (totBoostB < totBoostA) A = bestSide("A", B.w);
        else B = bestSide("B", A.w);
      }

      const bestA = A.best, bestB = B.best;
      const bookA = A.w ? A.w.name : null, bookB = B.w ? B.w.name : null;
      const bestAInp = A.inp, bestBInp = B.inp;
      const bestABoost = A.boost, bestBBoost = B.boost;

      // Highlight the best (or only) filled price for each side. bestAInp/bestBInp
      // are always a filled input, so an empty odds box is never highlighted.
      qa(".odds.best").forEach(i => i.classList.remove("best"));
      if (bestAInp) bestAInp.classList.add("best");
      if (bestBInp) bestBInp.classList.add("best");

      if (bookA == null || bookB == null) {
        verdict.className = "verdict idle";
        verdict.textContent = "— — —";
        meter.style.display = "none";
        breakdown.className = "breakdown";
        // Stake boxes stay visible in a neutral state (no odds to suggest from yet).
        qa(".book-stake").forEach(w => {
          w.className = "book-stake";
          w.querySelector(".stake-label").textContent = "Your stake";
          w.querySelector(".book-stake-input").placeholder = "";
          w.querySelector(".stake-suggest").textContent = "";
          w.querySelector(".stake-note").textContent = "";
        });
        return;
      }

      const implied = 1 / bestA + 1 / bestB;
      const impliedPct = implied * 100;

      meter.style.display = "block";
      // Bar zooms in on 90%-110% market total; break-even (100%) is the marked
      // midpoint. Fill reaching the mark = break-even; short of it = arbitrage.
      const fillPct = Math.max(0, Math.min(100, (impliedPct - 90) / 20 * 100));
      meterFill.style.width = fillPct + "%";

      if (implied < 1) {
        const margin = (1 - implied) * 100;
        verdict.className = "verdict yes";
        verdict.textContent = "YES";
        meterFill.style.background = "var(--green)";
        pct.innerHTML = `Market total <b>${impliedPct.toFixed(2)}%</b> · edge <b>${margin.toFixed(2)}%</b> under break-even`;
      } else {
        const over = (implied - 1) * 100;
        verdict.className = "verdict no";
        verdict.textContent = "NO";
        meterFill.style.background = "var(--red)";
        pct.innerHTML = `Market total <b>${impliedPct.toFixed(2)}%</b> · <b>${over.toFixed(2)}%</b> over break-even`;
      }

      // Which book holds each winning side (a single book may hold both).
      const bestAEl = bestAInp.closest(".book");
      const bestBEl = bestBInp.closest(".book");
      const sameBook = bestAEl === bestBEl;
      const stakeVal = el => { const v = parseFloat(el.querySelector(".book-stake-input").value); return (isNaN(v) || v <= 0) ? null : v; };

      // Effective stakes for the math + a greyed suggestion for the empty box.
      // The suggestion balances around whatever the user has already entered;
      // it is never written into the input — the user's value is left untouched.
      let effA, effB, suggA = null, suggB = null;
      if (sameBook) {
        const entered = stakeVal(bestAEl);            // this book's box = total across both legs
        const T = entered != null ? entered : DEFAULT_TOTAL;
        effA = T * (1 / bestA) / implied;
        effB = T * (1 / bestB) / implied;
        if (entered == null) suggA = T;
      } else {
        const eaA = stakeVal(bestAEl), eaB = stakeVal(bestBEl);
        if (eaA != null && eaB == null) { effA = eaA; effB = eaA * bestA / bestB; suggB = effB; }
        else if (eaB != null && eaA == null) { effB = eaB; effA = eaB * bestB / bestA; suggA = effA; }
        else if (eaA != null && eaB != null) { effA = eaA; effB = eaB; }
        else { effA = DEFAULT_TOTAL * (1 / bestA) / implied; effB = DEFAULT_TOTAL * (1 / bestB) / implied; suggA = effA; suggB = effB; }
      }

      // Render each book's stake box (never overwrite the typed value).
      [...booksEl.querySelectorAll(".book")].forEach(bk => {
        const wrap = bk.querySelector(".book-stake");
        const label = bk.querySelector(".stake-label");
        const note = bk.querySelector(".stake-note");
        const suggest = bk.querySelector(".stake-suggest");
        const inp = bk.querySelector(".book-stake-input");
        const showSuggest = sv => {
          inp.placeholder = sv != null ? sv.toFixed(2) : "";
          suggest.textContent = sv != null ? "Suggested: $" + sv.toFixed(2) : "";
        };
        const boostTag = b => b > 0 ? ` · +${b}% boost` : "";
        note.textContent = "";
        if (sameBook && bk === bestAEl) {
          wrap.className = "book-stake"; label.textContent = `Your stake · both legs at this book${boostTag(bestABoost)}`; showSuggest(suggA);
        } else if (!sameBook && bk === bestAEl) {
          wrap.className = "book-stake"; label.textContent = `Your stake · Team A @ ${bestA.toFixed(2)}${boostTag(bestABoost)}`; showSuggest(suggA);
        } else if (!sameBook && bk === bestBEl) {
          wrap.className = "book-stake"; label.textContent = `Your stake · Team B @ ${bestB.toFixed(2)}${boostTag(bestBBoost)}`; showSuggest(suggB);
        } else {
          wrap.className = "book-stake off"; label.textContent = "Your stake";
          inp.placeholder = ""; suggest.textContent = ""; note.textContent = "Not the best price — no bet here";
        }
      });

      // Returns per outcome (equal when balanced; may differ if the user typed both sides).
      const total = effA + effB;
      const retA = effA * bestA, retB = effB * bestB;
      const balanced = Math.abs(retA - retB) < 0.005;
      const worstProfit = Math.min(retA, retB) - total;
      const profitColor = worstProfit >= 0 ? "var(--green)" : "var(--red)";

      breakdown.className = "breakdown show";
      breakdown.innerHTML = balanced
        ? `<div class="line"><span class="lbl">Total staked</span><span class="amt">${money(total)}</span></div>
           <div class="line"><span class="lbl">Guaranteed return</span><span class="amt">${money(retA)}</span></div>
           <div class="profit"><span class="lbl">Profit</span><span class="amt" style="color:${profitColor}">${money(retA - total)}</span></div>`
        : `<div class="line"><span class="lbl">Total staked</span><span class="amt">${money(total)}</span></div>
           <div class="line"><span class="lbl">If Team A wins</span><span class="amt">${money(retA)}</span></div>
           <div class="line"><span class="lbl">If Team B wins</span><span class="amt">${money(retB)}</span></div>
           <div class="profit"><span class="lbl">Profit · worst case</span><span class="amt" style="color:${profitColor}">${money(worstProfit)}</span></div>`;
    }

    // start with two books
    addBook();
    addBook();
    calc();
    return root;
  }

  // --- stage / add-ticket ---------------------------------------------------
  const stage = document.getElementById("stage");
  const addTicketBtn = document.getElementById("addTicket");

  function addTicket() {
    const t = createTicket();
    stage.insertBefore(t, addTicketBtn); // keep the + button at the far right
    addTicketBtn.scrollIntoView({ inline: "end", block: "nearest" });
    return t;
  }

  addTicketBtn.addEventListener("click", addTicket);

  addTicket(); // first ticket on load
</script>
</body>
</html>
